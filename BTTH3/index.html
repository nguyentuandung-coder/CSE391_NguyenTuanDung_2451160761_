<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý sinh viên</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Quản lý sinh viên</h1>
    </header>

    <main>
      <div class="toolbar">
        <button id="add">Thêm sinh viên</button>
      </div>

      <div class="stats">
        <div>
          <strong>Tổng số sinh viên:</strong>
          <span id="total-count">0</span>
        </div>
        <div>
          <strong>Điểm trung bình cả lớp:</strong>
          <span id="avg-score">0.00</span>
        </div>
      </div>

      <div id="message"></div>

      <table>
        <thead>
          <tr>
            <th>Mã sinh viên</th>
            <th>Họ và tên</th>
            <th>Ngày sinh</th>
            <th>Lớp học</th>
            <th>Điểm TB</th>
            <th>Email</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="student-list"></tbody>
      </table>
    </main>

    <div id="modal">
      <div class="modal-content">
        <h2 id="modal-title">Thêm sinh viên</h2>

        <form id="student-form">
          <input type="text" id="masv" placeholder="Mã sinh viên" />
          <small id="masv-error" class="error-message"></small>

          <input type="text" id="hoten" placeholder="Họ và tên" />
          <small id="hoten-error" class="error-message"></small>

          <input type="date" id="ngaysinh" />
          <small id="ngaysinh-error" class="error-message"></small>

          <input type="text" id="lophoc" placeholder="Lớp học" />
          <small id="lophoc-error" class="error-message"></small>

          <input
            type="number"
            id="diemtb"
            placeholder="Điểm trung bình"
            step="0.1"
          />
          <small id="diemtb-error" class="error-message"></small>

          <input type="text" id="email" placeholder="Email" />
          <small id="email-error" class="error-message"></small>

          <div class="form-actions">
            <button type="submit" id="save-btn">Lưu</button>
            <button type="button" id="close-btn">Hủy</button>
          </div>
        </form>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
