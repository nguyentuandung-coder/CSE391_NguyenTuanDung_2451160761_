<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <form id="registerForm" class="form">
        <h1>Đăng ký tài khoản</h1>

        <div class="form-group">
          <label for="name">Tên</label>
          <div class="input-wrap">
            <input id="name" type="text" placeholder="Nhập tên của bạn" />
            <span id="nameStatus" class="status"></span>
          </div>
          <small id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="example@gmail.com" />
            <span id="emailStatus" class="status"></span>
          </div>
          <small id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu" />

          <div class="strength">
            <div id="strengthBar"></div>
          </div>

          <p id="strengthText">Chưa nhập mật khẩu</p>
          <small id="passwordError"></small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="input-wrap">
            <input
              id="confirmPassword"
              type="password"
              placeholder="Nhập lại mật khẩu"
            />
            <span id="confirmStatus" class="status"></span>
          </div>
          <small id="confirmError"></small>
        </div>

        <div class="form-group">
          <label for="phone">Số điện thoại</label>
          <div class="input-wrap">
            <input
              id="phone"
              type="text"
              placeholder="0901-234-567"
              maxlength="12"
            />
            <span id="phoneStatus" class="status"></span>
          </div>
          <small id="phoneError"></small>
        </div>

        <button id="submitBtn" type="submit" disabled>Đăng ký</button>
      </form>
    </main>

    <div id="successModal" class="modal hidden">
      <div class="modal-content">
        <h2>Đăng ký thành công!</h2>
        <div id="modalInfo"></div>
        <button id="closeModal" type="button">Đóng</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
