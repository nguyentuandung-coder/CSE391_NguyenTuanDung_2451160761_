<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Product Catalog</h1>

      <div class="actions">
        <button id="darkModeBtn">🌙 Dark</button>
        <div class="cart">
          🛒
          <span id="cartBadge">0</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Tìm sản phẩm..." />

        <div id="categoryButtons" class="categories"></div>

        <select id="sortSelect">
          <option value="default">Sắp xếp</option>
          <option value="price-asc">Giá tăng</option>
          <option value="price-desc">Giá giảm</option>
          <option value="name-az">Tên A-Z</option>
          <option value="rating-desc">Đánh giá cao nhất</option>
        </select>
      </div>

      <section id="productGrid" class="product-grid"></section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button id="closeModal" class="close-btn">×</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
