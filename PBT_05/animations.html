<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css" />
  </head>
  <body>
    <header class="hero fade-in">
      <h1>CSS Transitions & Animations</h1>
      <p>Demo card hover, button hover, image zoom, spinner và fade-in.</p>
    </header>

    <section class="loading-section fade-in">
      <h2>Loading Spinner</h2>
      <div class="spinner"></div>
    </section>

    <main class="product-grid">
      <article class="product-card fade-in">
        <div class="image-wrapper">
          <img src="https://picsum.photos/400/250?random=1" alt="Sản phẩm 1" />
        </div>
        <div class="card-body">
          <h3>iPhone 16</h3>
          <p>25.990.000đ</p>
          <button>Mua ngay</button>
        </div>
      </article>

      <article class="product-card fade-in">
        <div class="image-wrapper">
          <img src="https://picsum.photos/400/250?random=2" alt="Sản phẩm 2" />
        </div>
        <div class="card-body">
          <h3>MacBook Pro</h3>
          <p>45.990.000đ</p>
          <button>Mua ngay</button>
        </div>
      </article>

      <article class="product-card fade-in">
        <div class="image-wrapper">
          <img src="https://picsum.photos/400/250?random=3" alt="Sản phẩm 3" />
        </div>
        <div class="card-body">
          <h3>AirPods Pro</h3>
          <p>5.990.000đ</p>
          <button>Mua ngay</button>
        </div>
      </article>
    </main>
  </body>
</html>
