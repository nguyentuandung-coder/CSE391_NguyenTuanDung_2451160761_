<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Cascade Puzzle</title>

    <style>
      body {
        font-size: 16px;
        color: #333;
      }
      .container {
        font-size: 14px;
      }
      .card {
        color: blue;
      }
      .card .title {
        font-size: 20px;
      }
      .card p {
        color: inherit;
      }
      #featured .title {
        color: red;
      }
      .highlight {
        color: green !important;
      }

      .card {
        border: 1px solid #ccc;
        padding: 15px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" id="featured">
        <h2 class="title highlight">Sản phẩm A</h2>
        <p>Mô tả sản phẩm</p>
      </div>

      <div class="card">
        <h2 class="title">Sản phẩm B</h2>
        <p class="highlight">Mô tả sản phẩm B</p>
      </div>
    </div>
  </body>
</html>
