<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Debug CSS Layout</title>
    <link rel="stylesheet" href="debug_layout.css" />
  </head>
  <body>
    <h1>Câu C1 — Debug CSS Layout</h1>

    <section>
      <h2>Layout bị vỡ</h2>
      <div class="container broken">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content bị đẩy xuống dòng mới</div>
      </div>
    </section>

    <section>
      <h2>Cách sửa 1 dùng border-box</h2>
      <div class="container fix-border-box">
        <div class="sidebar">Sidebar 300px</div>
        <div class="content">Content 660px</div>
      </div>
    </section>

    <section>
      <h2>Cách sửa 2 không dùng border-box</h2>
      <div class="container fix-content-box">
        <div class="sidebar">Sidebar thực tế 342px</div>
        <div class="content">Content width sửa thành 556px</div>
      </div>
    </section>
  </body>
</html>
