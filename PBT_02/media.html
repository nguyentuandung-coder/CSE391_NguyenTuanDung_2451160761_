<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Multimedia</title>
  </head>
  <body>
    <header>
      <h1>Giới thiệu sản phẩm</h1>
    </header>

    <main>
      <section>
        <h2>Hình ảnh sản phẩm</h2>

        <figure>
          <img
            src="https://placehold.co/300x200"
            alt="iPhone 16 Pro Max màu Titan mặt trước"
            loading="lazy"
            style="max-width: 100%; height: auto"
          />
          <figcaption>iPhone 16 Pro Max - Mặt trước</figcaption>
        </figure>

        <figure>
          <img
            src="https://placehold.co/300x200"
            alt="iPhone 16 Pro Max mặt sau camera"
            loading="lazy"
            style="max-width: 100%; height: auto"
          />
          <figcaption>Thiết kế camera cao cấp</figcaption>
        </figure>

        <figure>
          <img
            src="https://placehold.co/300x200"
            alt="iPhone 16 Pro Max hiển thị giao diện iOS"
            loading="lazy"
            style="max-width: 100%; height: auto"
          />
          <figcaption>Giao diện iOS mượt mà</figcaption>
        </figure>
      </section>

      <section>
        <h2>Video giới thiệu (YouTube)</h2>

        <iframe
          width="500"
          height="300"
          src="https://www.youtube.com/shorts/REPQSzJqiXs"
          title="Video giới thiệu sản phẩm"
          allowfullscreen
        >
        </iframe>
      </section>

      <section>
        <h2>Video demo sản phẩm</h2>

        <video controls width="400" poster="https://placehold.co/400x250">
          <source src="demo.mp4" type="video/mp4" />
          <source src="demo.webm" type="video/webm" />
          Trình duyệt không hỗ trợ video
        </video>
      </section>

      <section>
        <h2>Nhạc nền</h2>

        <audio controls>
          <source src="audio.mp3" type="audio/mpeg" />
        </audio>
      </section>

      <section>
        <h2>Logo (SVG)</h2>
        <img
          src="hinh-tron.jpg"
          alt="Logo"
          style="max-width: 100%; height: auto"
        />
      </section>
    </main>

    <footer>
      <p>&copy; 2026 ShopTLU</p>
    </footer>
  </body>
</html>
