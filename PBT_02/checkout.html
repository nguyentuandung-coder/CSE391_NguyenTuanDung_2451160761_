<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thanh toán</title>
  </head>
  <body>
    <h1>Trang đặt hàng</h1>

    <!-- PHẦN 1: GIỎ HÀNG -->
    <h2>Giỏ hàng</h2>

    <table border="1">
      <tr>
        <th>STT</th>
        <th>Sản phẩm</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
        <th>Thành tiền</th>
      </tr>

      <tr>
        <td>1</td>
        <td>iPhone 16</td>
        <td>25.000.000đ</td>
        <td>1</td>
        <td>25.000.000đ</td>
      </tr>

      <tr>
        <td>2</td>
        <td>AirPods</td>
        <td>5.000.000đ</td>
        <td>1</td>
        <td>5.000.000đ</td>
      </tr>

      <tr>
        <td>3</td>
        <td>Apple Watch</td>
        <td>10.000.000đ</td>
        <td>1</td>
        <td>10.000.000đ</td>
      </tr>

      <tfoot>
        <tr>
          <td colspan="4">Tổng cộng</td>
          <td>40.000.000đ</td>
        </tr>
      </tfoot>
    </table>

    <br />

    <!-- PHẦN 2: FORM -->
    <h2>Thông tin thanh toán</h2>

    <form action="#" method="POST">
      <fieldset>
        <legend>Phương thức thanh toán</legend>

        <input type="radio" id="cod" name="payment" value="cod" required />
        <label for="cod">Cod</label><br />

        <input type="radio" id="bank" name="payment" value="bank" />
        <label for="bank">Chuyển khoản</label><br />

        <input type="radio" id="ewallet" name="payment" value="ewallet" />
        <label for="ewallet">Ví điện tử</label>
      </fieldset>

      <br />

      <label for="coupon">Mã giảm giá:</label><br />
      <input type="text" id="coupon" name="coupon" pattern="SALE[0-9]{4}" />

      <br /><br />

      <label for="note">Ghi chú:</label><br />
      <textarea id="note" name="note" rows="3"></textarea>

      <br /><br />

      <fieldset>
        <legend>Giao hàng</legend>

        <label for="date">Ngày giao:</label><br />
        <input type="date" id="date" name="date" />

        <br /><br />

        <label for="time">Khung giờ:</label><br />
        <select id="time" name="time">
          <option>Sáng</option>
          <option>Chiều</option>
          <option>Tối</option>
        </select>

        <br /><br />

        <label for="days">Số ngày giao:</label><br />
        <input type="range" id="days" name="days" min="1" max="7" />
      </fieldset>

      <br />

      <button type="submit">Đặt hàng</button>
      <button type="reset">Nhập lại</button>
    </form>
  </body>
</html>
