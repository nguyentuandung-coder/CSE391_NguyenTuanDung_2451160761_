<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản</title>
  </head>
  <body>
    <h1>Form đăng ký tài khoản</h1>
    <form action="#" method="post">
      <fieldset>
        <legend>Thông tin cá nhân</legend>
        <label for="fullname">Họ và tên:</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          required
          minlength="2"
          maxlength="50"
        />
        <br /><br />
        <label for="email">Email </label>
        <input type="email" id="email" name="email" required />
        <br /><br />
        <label for="phone">Số điện thoại</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" />
        <br /><br />
        <label for="dat">Ngày sinh</label>
        <input type="date" id="dat" name="dat" max="2026-12-31" />
      </fieldset>
      <fieldset>
        <legend>Tài khoản</legend>
        <label for="name">Username: </label>
        <input type="text" id="name" name="name" pattern="[A-Za-z0-9_]{3,20}" />
        <br /><br />
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
        />
        <br /><br />
        <label for="confirm">Xác nhận mật khẩu:</label>
        <input
          type="password"
          id="confirm"
          name="confirm"
          required
          minlength="8"
        />
      </fieldset>
      <fieldset>
        <legend>Thông tin giao hàng</legend>
        <label for="city">Thành phố:</label>
        <select id="city" name="city" required>
          <option value="">-- Chọn thành phố --</option>
          <option>Hà Nội</option>
          <option>TP.HCM</option>
          <option>Đà Nẵng</option>
          <option>Hải Phòng</option>
          <option>Cần Thơ</option>
        </select>
        <br /><br />
        <label for="district">Quận/Huyện:</label>
        <select id="district" name="district">
          <option>Quận 1</option>
          <option>Quận 2</option>
          <option>Quận 3</option>
        </select>
        <label for="address">Địa chỉ chi tiết:</label>
        <textarea id="address" name="address" rows="3"></textarea>

        <br /><br />

        <p>Giới tính:</p>
        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Nam</label><br />

        <input type="radio" id="female" name="gender" value="female" />
        <label for="female">Nữ</label><br />

        <input type="radio" id="other" name="gender" value="other" />
        <label for="other">Khác</label>
      </fieldset>

      <br />

      <input type="checkbox" id="agree" name="agree" required />
      <label for="agree">Tôi đồng ý với điều khoản</label>
      <button type="submit">Đăng ký</button>
      <button type="reset">Nhập lại</button>
    </form>
  </body>
</html>
